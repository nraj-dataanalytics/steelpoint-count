<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B2240">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Steel Point Deli — Daily Count</title>
<meta name="apple-mobile-web-app-title" content="SP Count">
<meta name="application-name" content="SP Count">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@500;700&family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --navy: #0B2240;
    --navy-2: #112d52;
    --orange: #F39200;
    --orange-2: #FFB13B;
    --cream: #FFF6E6;
    --bg: #F4F6F8;
    --ink: #0E1626;
    --gray-1: #E8ECEF;
    --gray-2: #C8CFD6;
    --gray-3: #7A8694;
    --red: #E63946;
    --red-bg: #FDE4E5;
    --amber: #F4A261;
    --amber-bg: #FFF1D6;
    --green: #2A9D8F;
    --green-bg: #E0F0EC;
    --refr: #2E86AB;
    --refr-bg: #DCEEF7;
    --frzr: #6B4E9E;
    --frzr-bg: #E6E0F0;
    --dry: #7A4E1D;
    --dry-bg: #F0E6D4;
    --pkg: #4A7C59;
    --pkg-bg: #DDEDD9;
    --shadow-sm: 0 1px 3px rgba(11, 34, 64, 0.08);
    --shadow-md: 0 4px 12px rgba(11, 34, 64, 0.12);
    --shadow-lg: 0 12px 32px rgba(11, 34, 64, 0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
}

/* ===== HEADER ===== */
.header {
    background: var(--navy);
    color: white;
    padding: 14px 18px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-md);
}
.header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}
.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}
.brand-logo {
    width: 38px; height: 38px;
    background: var(--orange);
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-family: 'Anton', sans-serif;
    color: var(--navy);
    font-size: 18px;
    border: 2px solid white;
}
.brand-name {
    font-family: 'Anton', sans-serif;
    font-size: 20px;
    letter-spacing: 0.5px;
    line-height: 1;
}
.brand-tag {
    font-size: 10px;
    color: var(--orange-2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    margin-top: 2px;
}
.date-block {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
}
.date-main { font-size: 14px; font-weight: 700; }
.date-sub { font-size: 10px; color: var(--orange-2); text-transform: uppercase; letter-spacing: 1px; }

/* ===== META BAR ===== */
.meta-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
    background: var(--navy-2);
    padding: 8px;
    border-radius: 8px;
}
.meta-field {
    display: flex;
    flex-direction: column;
}
.meta-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--orange-2);
    font-weight: 700;
    margin-bottom: 2px;
}
.meta-input, .meta-select {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 8px;
    border-radius: 5px;
    outline: none;
    width: 100%;
}
.meta-input:focus, .meta-select:focus {
    border-color: var(--orange);
    background: rgba(255,255,255,0.12);
}
.meta-select {
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23F39200' d='M0 0l6 8 6-8z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 8px center;
    padding-right: 22px;
}

/* ===== KPI STRIP ===== */
.kpi-strip {
    background: white;
    padding: 10px 12px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    border-bottom: 1px solid var(--gray-1);
    position: sticky;
    top: 0;
    z-index: 50;
}
.kpi {
    text-align: center;
    padding: 6px 4px;
    border-radius: 6px;
    background: var(--bg);
    border: 1.5px solid transparent;
    transition: all 0.18s;
}
.kpi-value {
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    line-height: 1;
    color: var(--ink);
}
.kpi-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gray-3);
    margin-top: 3px;
    font-weight: 700;
}
.kpi.done { background: var(--green-bg); border-color: var(--green); }
.kpi.done .kpi-value { color: var(--green); }
.kpi.warn { background: var(--amber-bg); border-color: var(--amber); }
.kpi.warn .kpi-value { color: #C77700; }
.kpi.alert { background: var(--red-bg); border-color: var(--red); }
.kpi.alert .kpi-value { color: var(--red); }

/* ===== ZONE TABS ===== */
.zone-tabs {
    background: white;
    padding: 10px 8px 8px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-bottom: 2px solid var(--gray-1);
    position: sticky;
    top: 100px;
    z-index: 40;
    scrollbar-width: none;
}
.zone-tabs::-webkit-scrollbar { display: none; }
.zone-tab {
    flex-shrink: 0;
    padding: 10px 16px;
    background: var(--gray-1);
    border: 2px solid transparent;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 1.5px;
    color: var(--gray-3);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.18s;
    -webkit-user-select: none;
    user-select: none;
}
.zone-tab .zone-icon {
    font-size: 16px;
}
.zone-tab .zone-count {
    background: var(--gray-3);
    color: white;
    border-radius: 12px;
    padding: 2px 8px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
}
.zone-tab.active {
    background: var(--navy);
    color: white;
    border-color: var(--orange);
}
.zone-tab.active .zone-count {
    background: var(--orange);
    color: var(--navy);
}
.zone-tab.completed {
    background: var(--green-bg);
    color: var(--green);
}
.zone-tab.completed .zone-count {
    background: var(--green);
    color: white;
}

/* ===== ITEM LIST ===== */
.list {
    padding: 12px;
    padding-bottom: 100px;
}
.zone-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0 10px;
    padding: 0 4px;
}
.zone-divider-line {
    flex: 1;
    height: 2px;
    background: var(--gray-1);
}
.zone-divider-text {
    font-family: 'Anton', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--gray-3);
}

.item-card {
    background: white;
    border-radius: 12px;
    margin-bottom: 8px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    border-left: 5px solid var(--gray-2);
    transition: all 0.2s;
}
.item-card.counted { border-left-color: var(--green); }
.item-card.below-par { border-left-color: var(--red); }
.item-card.expanded { box-shadow: var(--shadow-md); }

.item-row {
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    min-height: 64px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
}
.item-info {
    min-width: 0;
}
.item-name {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.25;
    margin-bottom: 3px;
}
.item-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--gray-3);
}
.item-meta .id {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 600;
}
.item-meta .par {
    font-weight: 600;
}

.count-tap {
    background: var(--cream);
    border: 2.5px solid var(--orange);
    border-radius: 12px;
    min-width: 84px;
    min-height: 56px;
    display: grid;
    place-items: center;
    font-family: 'Anton', sans-serif;
    font-size: 28px;
    color: var(--navy);
    line-height: 1;
    transition: all 0.15s;
    position: relative;
}
.count-tap:active {
    transform: scale(0.96);
    background: var(--orange);
    color: white;
}
.count-tap.empty {
    background: white;
    border-color: var(--gray-2);
    color: var(--gray-3);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.count-tap.counted {
    background: var(--green);
    color: white;
    border-color: var(--green);
}
.count-tap.below-par {
    background: var(--red);
    color: white;
    border-color: var(--red);
    animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.4); }
    50% { box-shadow: 0 0 0 8px rgba(230, 57, 70, 0); }
}
.count-unit {
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    opacity: 0.8;
    text-transform: lowercase;
    letter-spacing: 0;
    display: block;
    margin-top: -2px;
}

.item-expanded {
    display: none;
    background: var(--bg);
    padding: 12px 14px;
    border-top: 1px solid var(--gray-1);
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}
.item-card.expanded .item-expanded { display: grid; }
.field-mini {
    display: flex;
    flex-direction: column;
}
.field-mini-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--gray-3);
    font-weight: 700;
    margin-bottom: 3px;
}
.field-mini-input {
    background: white;
    border: 1.5px solid var(--gray-2);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    outline: none;
    width: 100%;
}
.field-mini-input:focus { border-color: var(--orange); }
.field-notes { grid-column: 1 / -1; }
.field-notes input {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
}

/* ===== NUMBER PAD MODAL ===== */
.modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(11, 34, 64, 0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: flex-end;
    z-index: 1000;
    animation: fadeIn 0.18s ease;
}
.modal-backdrop.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.numpad {
    background: white;
    border-radius: 22px 22px 0 0;
    width: 100%;
    padding: 20px 16px 24px;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.25);
    animation: slideUp 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.1);
    max-width: 540px;
    margin: 0 auto;
}
.numpad-handle {
    width: 44px;
    height: 4px;
    background: var(--gray-2);
    border-radius: 2px;
    margin: 0 auto 14px;
}
.numpad-header {
    text-align: center;
    margin-bottom: 14px;
}
.numpad-item {
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    color: var(--navy);
    letter-spacing: 0.5px;
    line-height: 1.1;
}
.numpad-sub {
    font-size: 11px;
    color: var(--gray-3);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    margin-top: 4px;
}
.numpad-sub b { color: var(--orange); }

.numpad-display {
    background: var(--navy);
    color: var(--orange-2);
    font-family: 'Anton', sans-serif;
    font-size: 48px;
    text-align: center;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 16px;
    letter-spacing: 2px;
    min-height: 92px;
    display: grid;
    place-items: center;
    line-height: 1;
}
.numpad-display .unit-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--orange);
    letter-spacing: 1px;
    margin-top: 4px;
    text-transform: lowercase;
}

.numpad-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}
.numkey {
    background: var(--bg);
    border: none;
    border-radius: 14px;
    padding: 18px 0;
    font-family: 'Anton', sans-serif;
    font-size: 30px;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.1s;
    -webkit-user-select: none;
    user-select: none;
    border: 2px solid transparent;
}
.numkey:active {
    background: var(--cream);
    border-color: var(--orange);
    transform: scale(0.94);
}
.numkey.fn {
    background: var(--gray-1);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--gray-3);
    text-transform: uppercase;
    letter-spacing: 1px;
}
.numkey.fn.red { background: var(--red-bg); color: var(--red); }
.numkey.fn.green { background: var(--green); color: white; font-size: 16px; }

/* ===== BOTTOM ACTION BAR ===== */
.action-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
    padding: 10px 12px env(safe-area-inset-bottom);
    display: flex;
    gap: 8px;
    z-index: 90;
    border-top: 2px solid var(--gray-1);
}
.action-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 1.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    -webkit-user-select: none;
    user-select: none;
    transition: transform 0.1s;
}
.action-btn:active { transform: scale(0.97); }
.action-btn.secondary {
    background: var(--gray-1);
    color: var(--navy);
}
.action-btn.primary {
    background: var(--orange);
    color: white;
}
.action-btn.danger {
    background: var(--red-bg);
    color: var(--red);
}

/* ===== EMPTY STATE / FILTER STATES ===== */
.search-filter {
    background: white;
    padding: 10px 12px;
    border-bottom: 1px solid var(--gray-1);
    display: flex;
    gap: 8px;
}
.search-input {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    outline: none;
}
.search-input:focus { border-color: var(--orange); }
.filter-btn {
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 0 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 1.5px;
    color: var(--navy);
    cursor: pointer;
}
.filter-btn.active {
    background: var(--navy);
    color: white;
    border-color: var(--orange);
}

/* ===== TOAST ===== */
.toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--navy);
    color: white;
    padding: 12px 22px;
    border-radius: 28px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 200;
    max-width: 90%;
    text-align: center;
    border-left: 3px solid var(--orange);
}
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* ===== SUMMARY SCREEN ===== */
.summary-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 500;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
.summary-modal.show { display: block; }
.summary-header {
    background: var(--navy);
    color: white;
    padding: 18px 18px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow-md);
}
.summary-title {
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
}
.summary-close {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
}
.summary-body { padding: 16px; padding-bottom: 100px; }
.summary-section {
    background: white;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
}
.summary-section h3 {
    font-family: 'Anton', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--navy);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--gray-1);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
}
.summary-section h3 .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gray-3);
    letter-spacing: 0;
}
.summary-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    padding: 8px 0;
    align-items: center;
    border-bottom: 1px solid var(--gray-1);
    font-size: 13px;
}
.summary-item:last-child { border-bottom: none; }
.summary-item-name { font-weight: 600; }
.summary-item-val {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    text-align: right;
}
.summary-item .badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
}
.badge.red { background: var(--red); color: white; }
.badge.amber { background: var(--amber); color: white; }
.badge.green { background: var(--green); color: white; }

.summary-actions {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    padding: 12px 16px env(safe-area-inset-bottom);
    box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
    display: flex;
    gap: 8px;
    border-top: 2px solid var(--gray-1);
}


/* ===== SUBMIT OVERLAY ===== */
.submit-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(11,34,64,0.85);
    z-index: 2000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
}
.submit-overlay.show { display: flex; }
.spinner {
    width: 56px; height: 56px;
    border: 5px solid rgba(243,146,0,0.3);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.submit-msg {
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: white;
}
.submit-sub {
    font-size: 13px;
    color: var(--orange-2);
    font-weight: 600;
    text-align: center;
    max-width: 260px;
    line-height: 1.5;
}

/* ===== SUCCESS SCREEN ===== */
.success-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--navy);
    z-index: 2000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
    text-align: center;
}
.success-screen.show { display: flex; }
.success-icon {
    width: 80px; height: 80px;
    background: var(--green);
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 40px;

function loadState() {
    try {

        const parsed = JSON.parse(raw);
        // If saved date != today, start fresh
        const today = new Date().toISOString().slice(0,10);
        if (parsed.date !== today) {

            archiveSession(parsed);

function filteredItems() {
    let list = (activeZone === "all") ? ITEMS.slice() : ITEMS.filter(i => i.storage === activeZone);
    if (searchTerm) {
        const t = searchTerm.toLowerCase();
        list = list.filter(i => i.name.toLowerCase().includes(t) || i.id.toLowerCase().includes(t) || i.cat.toLowerCase().includes(t));
    }
    if (filterUncounted) {
        list = list.filter(i => !state.counts[i.id] || state.counts[i.id].closing === "" || state.counts[i.id].closing === null);
    }
    // Sort by storage zone walking order then category then name
    const order = {Refrigerated:0, Frozen:1, Dry:2, Packaging:3};
    list.sort((a,b) => (order[a.storage]-order[b.storage]) || a.cat.localeCompare(b.cat) || a.name.localeCompare(b.name));
    return list;
}

    wrap.innerHTML = "";
    const list = filteredItems();
    if (list.length === 0) {
        wrap.innerHTML = `<div style="text-align:center;padding:50px 20px;color:var(--gray-3);font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:18px;">No items match</div>`;
        return;
    }
    let lastZone = null;
    list.forEach(item => {
        if (activeZone === "all" && item.storage !== lastZone) {
            const div = document.createElement("div");
            div.className = "zone-divider";
            const icon = ZONES.find(z=>z.id===item.storage)?.icon || "■";
            div.innerHTML = `<div class="zone-divider-line"></div><div class="zone-divider-text">${icon}  ${item.storage.toUpperCase()}</div><div class="zone-divider-line"></div>`;
            wrap.appendChild(div);
            lastZone = item.storage;
        }
        wrap.appendChild(renderCard(item));
    });
}

function renderCard(item) {
    const c = state.counts[item.id] || { opening:"", received:"", waste:"", closing:"", notes:"" };
    const counted = c.closing !== "" && c.closing !== null && c.closing !== undefined;
    const closingNum = counted ? parseFloat(c.closing) : null;
    const belowRop = counted && closingNum <= item.rop;
    const belowPar = counted && closingNum < item.par;

    const card = document.createElement("div");
    card.className = "item-card" + (counted ? " counted" : "") + (belowPar ? " below-par" : "");
    card.dataset.id = item.id;

    const tapStateClass = !counted ? "empty" : (belowRop ? "below-par" : "counted");
    const tapDisplay = counted ? closingNum : "TAP";

    card.innerHTML = `
        <div class="item-row">
            <div class="item-info">
                <div class="item-name">${escapeHtml(item.name)}</div>
                <div class="item-meta">
                    <span class="id">${item.id}</span>
                    <span>${escapeHtml(item.cat)}</span>
                    <span class="par">PAR: ${item.par} ${item.unit}</span>
                </div>
            </div>
            <div class="count-tap ${tapStateClass}" data-action="count">
                ${tapDisplay}
                <span class="count-unit">${item.unit}</span>
            </div>
        </div>
        <div class="item-expanded">
            <div class="field-mini">
                <label class="field-mini-label">Opening</label>
                <input type="number" inputmode="decimal" class="field-mini-input" data-field="opening" value="${c.opening ?? ''}" placeholder="0">
            </div>
            <div class="field-mini">
                <label class="field-mini-label">Received</label>
                <input type="number" inputmode="decimal" class="field-mini-input" data-field="received" value="${c.received ?? ''}" placeholder="0">
            </div>
            <div class="field-mini">
                <label class="field-mini-label">Waste</label>
                <input type="number" inputmode="decimal" class="field-mini-input" data-field="waste" value="${c.waste ?? ''}" placeholder="0">
            </div>
            <div class="field-mini">
                <label class="field-mini-label">Closing</label>
                <input type="number" inputmode="decimal" class="field-mini-input" data-field="closing" value="${c.closing ?? ''}" placeholder="0">
            </div>
            <div class="field-mini field-notes">
                <label class="field-mini-label">Notes</label>
                <input type="text" class="field-mini-input" data-field="notes" value="${escapeAttr(c.notes ?? '')}" placeholder="e.g. low quality, returned partial case…">
            </div>
        </div>
    `;

    // Tap to open numpad
    card.querySelector(".count-tap").addEventListener("click", (e) => {
        e.stopPropagation();
        openNumpad(item, "closing");
    });
    // Tap rest of row to expand
    card.querySelector(".item-row").addEventListener("click", () => {
        card.classList.toggle("expanded");
    });
    // Inputs
    card.querySelectorAll(".field-mini-input").forEach(inp => {
        inp.addEventListener("input", (e) => {
            const f = inp.dataset.field;
            state.counts[item.id][f] = inp.value;
            saveState();
        });
        inp.addEventListener("change", (e) => {
            updateKpis();
            renderZoneTabs();
            // re-render just this card's tap state if closing changed
            if (inp.dataset.field === "closing") refreshCardState(item.id);
        });
        inp.addEventListener("click", (e) => e.stopPropagation());
    });
    return card;
}

function refreshCardState(id) {
    const card = document.querySelector(`.item-card[data-id="${id}"]`);
    if (!card) return;
    const item = ITEMS.find(i => i.id === id);
    const c = state.counts[id];
    const counted = c && c.closing !== "" && c.closing !== null && c.closing !== undefined;
    const closingNum = counted ? parseFloat(c.closing) : null;
    const belowRop = counted && closingNum <= item.rop;
    const belowPar = counted && closingNum < item.par;
    card.classList.toggle("counted", counted);
    card.classList.toggle("below-par", belowPar);
    const tap = card.querySelector(".count-tap");
    tap.className = "count-tap " + (!counted ? "empty" : (belowRop ? "below-par" : "counted"));
    tap.innerHTML = (counted ? closingNum : "TAP") + `<span class="count-unit">${item.unit}</span>`;
}

// ======= NUMPAD =======
let numpadBuffer = "";
function openNumpad(item, field) {
    activeItem = item;
    numpadField = field;
    const curr = state.counts[item.id]?.[field];
    numpadBuffer = (curr === "" || curr === null || curr === undefined) ? "" : String(curr);
    document.getElementById("numpadItemName").textContent = item.name;
    document.getElementById("numpadItemMeta").innerHTML =
        `<b>PAR ${item.par}</b> · ${item.cat} · ${item.id}`;
    document.getElementById("numpadUnit").textContent = item.unit;
    updateNumpadDisplay();
    document.getElementById("numpadModal").classList.add("show");
    document.body.style.overflow = "hidden";
}
function closeNumpad() {
    document.getElementById("numpadModal").classList.remove("show");
    document.body.style.overflow = "";
}
function updateNumpadDisplay() {
    document.getElementById("numpadValue").textContent = numpadBuffer || "0";
}
document.querySelectorAll(".numkey[data-num]").forEach(btn => {
    btn.addEventListener("click", () => {
        const n = btn.dataset.num;
        if (n === ".") {
            if (numpadBuffer.includes(".")) return;
            if (numpadBuffer === "") numpadBuffer = "0";
            numpadBuffer += ".";
        } else {
            if (numpadBuffer === "0") numpadBuffer = n;
            else numpadBuffer += n;
        }
        updateNumpadDisplay();
    });
});
document.getElementById("numpadClear").addEventListener("click", () => {
    numpadBuffer = numpadBuffer.slice(0, -1);
    updateNumpadDisplay();
});
document.getElementById("numpadCancel").addEventListener("click", closeNumpad);
document.getElementById("numpadOk").addEventListener("click", () => {
    if (!activeItem) return closeNumpad();
    state.counts[activeItem.id][numpadField] = numpadBuffer === "" ? "" : (isNaN(parseFloat(numpadBuffer)) ? "" : parseFloat(numpadBuffer));
    saveState();
    refreshCardState(activeItem.id);
    updateKpis();
    renderZoneTabs();
    showToast(`✓  ${activeItem.name} → ${numpadBuffer || "0"} ${activeItem.unit}`);
    closeNumpad();
});

// Close numpad on backdrop click
document.getElementById("numpadModal").addEventListener("click", (e) => {
    if (e.target.id === "numpadModal") closeNumpad();
});

// ======= KPIs =======
function updateKpis() {
    let counted = 0, orderNow = 0, watch = 0, wasteDollars = 0;
    ITEMS.forEach(it => {
        const c = state.counts[it.id];
        if (!c) return;
        if (c.closing !== "" && c.closing !== null && c.closing !== undefined) {
            counted++;
            const cn = parseFloat(c.closing);
            if (cn <= it.rop) orderNow++;
            else if (cn <= it.rop * 1.25) watch++;
        }
        if (c.waste !== "" && c.waste !== null && c.waste !== undefined && !isNaN(parseFloat(c.waste))) {
            wasteDollars += parseFloat(c.waste) * (it.cost || 0);
        }
    });
    document.getElementById("kpiProgressVal").textContent = counted + "/" + ITEMS.length;
    document.getElementById("kpiProgress").className = "kpi" + (counted === ITEMS.length ? " done" : "");
    document.getElementById("kpiOrderVal").textContent = orderNow;
    document.getElementById("kpiWatchVal").textContent = watch;
    document.getElementById("kpiWasteVal").textContent = "$" + wasteDollars.toFixed(0);
}

// ======= TOAST =======
let toastT = null;
function showToast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastT);
    toastT = setTimeout(() => el.classList.remove("show"), 2200);
}

// ======= ACTIONS =======
document.getElementById("btnSave").addEventListener("click", () => {
    state.shift = document.getElementById("shiftSelect").value;
    state.counter = document.getElementById("counterName").value;
    state.manager = document.getElementById("managerName").value;
    saveState();
    showToast("💾  Saved to this device");
});
document.getElementById("btnReset").addEventListener("click", () => {
    if (!confirm("Clear all counts for today? This can't be undone.")) return;
    state = defaultSession();
    saveState();
    renderAll();
    showToast("↺  Session reset");
});
document.getElementById("btnFinish").addEventListener("click", () => {
    state.shift = document.getElementById("shiftSelect").value;
    state.counter = document.getElementById("counterName").value;
    state.manager = document.getElementById("managerName").value;
    saveState();
    showSummary();
});

// ======= SEARCH / FILTER =======
document.getElementById("searchInput").addEventListener("input", (e) => {
    searchTerm = e.target.value;
    renderList();
});
document.getElementById("filterUncounted").addEventListener("click", () => {
    filterUncounted = !filterUncounted;
    document.getElementById("filterUncounted").classList.toggle("active", filterUncounted);
    renderList();
});

// Header inputs
document.getElementById("shiftSelect").addEventListener("change", (e) => { state.shift = e.target.value; saveState(); });
document.getElementById("counterName").addEventListener("input", (e) => { state.counter = e.target.value; saveState(); });
document.getElementById("managerName").addEventListener("input", (e) => { state.manager = e.target.value; saveState(); });

// ======= SUMMARY =======
function showSummary() {
    const body = document.getElementById("summaryBody");
    const orderNow = [], watch = [], counted = [], uncounted = [], bigVariance = [];
    let totalWaste = 0;
    ITEMS.forEach(it => {
        const c = state.counts[it.id] || {};
        if (c.closing !== "" && c.closing !== null && c.closing !== undefined) {
            const cn = parseFloat(c.closing);
            counted.push({...it, ...c, closingNum: cn});
            if (cn <= it.rop) orderNow.push({...it, ...c, closingNum: cn});
            else if (cn <= it.rop * 1.25) watch.push({...it, ...c, closingNum: cn});

            // variance check vs reference (ref - waste - usage)
            const open = parseFloat(c.opening) || 0;
            const recv = parseFloat(c.received) || 0;
            const waste = parseFloat(c.waste) || 0;
            if (open > 0) {
                const expected = open + recv - waste;
                if (expected > 0) {
                    const variance = (cn - expected) / expected;
                    if (Math.abs(variance) > 0.1) bigVariance.push({...it, ...c, variance, expected, closingNum: cn});
                }
            }
        } else {
            uncounted.push(it);
        }
        if (c.waste && !isNaN(parseFloat(c.waste))) {
            totalWaste += parseFloat(c.waste) * (it.cost || 0);
        }
    });

    let html = `
        <div class="summary-section">
            <h3>SESSION <span class="count">${state.date} · ${state.shift}</span></h3>
            <div class="summary-item">
                <div class="summary-item-name">Counter</div>
                <div></div>
                <div class="summary-item-val">${escapeHtml(state.counter || "—")}</div>
            </div>
            <div class="summary-item">
                <div class="summary-item-name">Manager</div>
                <div></div>
                <div class="summary-item-val">${escapeHtml(state.manager || "—")}</div>
            </div>
            <div class="summary-item">
                <div class="summary-item-name">Items Counted</div>
                <div></div>
                <div class="summary-item-val">${counted.length} / ${ITEMS.length}</div>
            </div>
            <div class="summary-item">
                <div class="summary-item-name">Total Waste $</div>
                <div></div>
                <div class="summary-item-val" style="color:var(--red);">$${totalWaste.toFixed(2)}</div>
            </div>
        </div>
    `;

    if (orderNow.length) {
        html += `<div class="summary-section"><h3>🔴 ORDER NOW <span class="count">${orderNow.length} items</span></h3>`;
        orderNow.forEach(it => {
            html += `<div class="summary-item">
                <div class="summary-item-name">${escapeHtml(it.name)}</div>
                <div><span class="badge red">ROP ${it.rop.toFixed(1)}</span></div>
                <div class="summary-item-val">${it.closingNum} ${it.unit}</div>
            </div>`;
        });
        html += `</div>`;
    }

    if (watch.length) {
        html += `<div class="summary-section"><h3>🟠 WATCH LIST <span class="count">${watch.length} items</span></h3>`;
        watch.forEach(it => {
            html += `<div class="summary-item">
                <div class="summary-item-name">${escapeHtml(it.name)}</div>
                <div><span class="badge amber">ROP ${it.rop.toFixed(1)}</span></div>
                <div class="summary-item-val">${it.closingNum} ${it.unit}</div>
            </div>`;
        });
        html += `</div>`;
    }

    if (bigVariance.length) {
        html += `<div class="summary-section"><h3>⚠ BIG VARIANCES <span class="count">${bigVariance.length} items · check shrinkage</span></h3>`;
        bigVariance.forEach(it => {
            const pct = (it.variance * 100).toFixed(1);
            const cls = it.variance < 0 ? "red" : "amber";
            html += `<div class="summary-item">
                <div class="summary-item-name">${escapeHtml(it.name)}<br><span style="font-size:11px;color:var(--gray-3);font-weight:500;">Expected ${it.expected.toFixed(1)}, counted ${it.closingNum}</span></div>
                <div><span class="badge ${cls}">${pct}%</span></div>
                <div class="summary-item-val">${it.closingNum} ${it.unit}</div>
            </div>`;
        });
        html += `</div>`;
    }

    if (uncounted.length) {
        html += `<div class="summary-section"><h3>⚪ STILL UNCOUNTED <span class="count">${uncounted.length} items</span></h3>`;
        uncounted.slice(0, 50).forEach(it => {
            html += `<div class="summary-item">
                <div class="summary-item-name">${escapeHtml(it.name)}</div>
                <div></div>
                <div class="summary-item-val" style="color:var(--gray-3);">—</div>
            </div>`;
        });
        if (uncounted.length > 50) html += `<div class="summary-item"><div class="summary-item-name">...and ${uncounted.length - 50} more</div><div></div><div></div></div>`;
        html += `</div>`;
    } else {
        html += `<div class="summary-section" style="background:var(--green-bg);border:2px solid var(--green);text-align:center;">
            <h3 style="color:var(--green);justify-content:center;border:none;">✓ ALL ITEMS COUNTED</h3>
            <div style="color:var(--green);font-weight:600;font-size:14px;">Great work. Download CSV and submit to manager.</div>
        </div>`;
    }

    body.innerHTML = html;
    document.getElementById("summaryModal").classList.add("show");
    document.body.style.overflow = "hidden";
}
document.getElementById("summaryClose").addEventListener("click", closeSummary);
document.getElementById("btnBack").addEventListener("click", closeSummary);
function closeSummary() {
    document.getElementById("summaryModal").classList.remove("show");
    document.body.style.overflow = "";
}

// ======= CSV EXPORT =======
document.getElementById("btnExportCsv").addEventListener("click", () => {
    const headers = ["Date","Shift","Counter","Manager","ID","Item","Category","Zone","Unit","PAR","ReorderPoint","Opening","Received","Waste","Closing","Status","VariancePct","Notes"];
    const rows = [headers.join(",")];
    ITEMS.forEach(it => {
        const c = state.counts[it.id] || {};
        const cn = c.closing === "" || c.closing == null ? "" : parseFloat(c.closing);
        const status = cn === "" ? "" : (cn <= it.rop ? "ORDER NOW" : (cn <= it.rop * 1.25 ? "Watch" : "OK"));
        let vpct = "";
        const open = parseFloat(c.opening) || 0;
        const recv = parseFloat(c.received) || 0;
        const waste = parseFloat(c.waste) || 0;
        if (open > 0 && cn !== "") {
            const expected = open + recv - waste;
            if (expected > 0) vpct = ((cn - expected) / expected * 100).toFixed(1) + "%";
        }
        rows.push([
            state.date, state.shift, csv(state.counter), csv(state.manager),
            it.id, csv(it.name), csv(it.cat), it.storage, it.unit, it.par, it.rop,
            c.opening ?? "", c.received ?? "", c.waste ?? "", c.closing ?? "",
            status, vpct, csv(c.notes ?? "")
        ].join(","));
    });
    const blob = new Blob([rows.join("\n")], {type: "text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `steel-point-count-${state.date}-${state.shift.toLowerCase()}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("⬇  CSV downloaded");
});

function csv(v) {
    if (v == null) return "";
    const s = String(v);
    if (s.includes(",") || s.includes('"') || s.includes("\n")) {
        return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
}
function escapeHtml(s) {
    if (s == null) return "";
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) {
    return escapeHtml(s);
}

// ======= INITIAL RENDER =======
function renderAll() {
    renderZoneTabs();
    renderList();
    updateKpis();
}
// Restore meta-bar values
document.getElementById("shiftSelect").value = state.shift || "Opening";
document.getElementById("counterName").value = state.counter || "";
document.getElementById("managerName").value = state.manager || "";
renderAll();


// ======= GOOGLE SHEETS SYNC =======
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxVoUXLF_9EQXZwt0SLw97jcnv9al9L-MoB04mfoKD0P3EF-IUjcCSPRoHO09XXkfui/exec";

function submitToSheet() {
    const counted = ITEMS.filter(it => {
        const c = state.counts[it.id];
        return c && c.closing !== "" && c.closing !== null && c.closing !== undefined;
    });

    if (counted.length === 0) {
        showToast("⚠  No items counted yet");
        return;
    }

    // Confirm before submitting
    const uncounted = ITEMS.length - counted.length;
    const msg = uncounted > 0
        ? `Submit ${counted.length} counted items?\n(${uncounted} items still uncounted — they will be skipped)`
        : `Submit all ${counted.length} items to Google Sheet?`;
    if (!confirm(msg)) return;

    // Show spinner
    document.getElementById("submitOverlay").classList.add("show");

    const rows = counted.map(it => {
        const c = state.counts[it.id] || {};
        const cn = parseFloat(c.closing);
        const status = cn <= it.rop ? "ORDER NOW" : (cn <= it.rop * 1.25 ? "Watch" : "OK");
        return {
            date: state.date,
            shift: state.shift || "—",
            counter: state.counter || "—",
            manager: state.manager || "—",
            id: it.id,
            name: it.name,
            cat: it.cat,
            storage: it.storage,
            unit: it.unit,
            par: it.par,
            opening: c.opening ?? "",
            received: c.received ?? "",
            waste: c.waste ?? "",
            closing: c.closing ?? "",
            status: status,
            notes: c.notes ?? ""
        };
    });

    fetch(SHEET_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ rows })
    })
    .then(() => {
        document.getElementById("submitOverlay").classList.remove("show");
        // Mark session as submitted
        state.submitted = true;
        saveState();
        // Show success
        const orderNow = rows.filter(r => r.status === "ORDER NOW").length;
        document.getElementById("successDetail").innerHTML =
            `<b>${state.date}</b> · ${state.shift}<br>` +
            `${rows.length} items recorded by <b>${state.counter || "Staff"}</b><br>` +
            (orderNow > 0 ? `<span style="color:var(--red)">⚠ ${orderNow} items need ordering</span>` : `<span style="color:var(--green)">✓ All stock levels OK</span>`);
        document.getElementById("successScreen").classList.add("show");
        document.getElementById("summaryModal").classList.remove("show");
    })
    .catch(err => {
        document.getElementById("submitOverlay").classList.remove("show");
        showToast("❌  Submit failed — check internet connection");
        console.error("Submit error:", err);
    });
}

document.getElementById("btnSubmitSheet").addEventListener("click", submitToSheet);

document.getElementById("successDone").addEventListener("click", () => {
    document.getElementById("successScreen").classList.remove("show");
    document.body.style.overflow = "";
});


// Show submitted badge if session was already submitted
function checkSubmittedBadge() {
    if (state.submitted) {
        const strip = document.getElementById("kpiProgress");
        strip.style.background = "var(--green-bg)";
        strip.title = "Already submitted to Sheet today";
    }
}

document.addEventListener('dblclick', function(e) { e.preventDefault(); }, {passive: false});
